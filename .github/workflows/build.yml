name: Build Study Hub

on:
  workflow_dispatch: {}   # run manually from the Actions tab to (re)generate the course

permissions:
  contents: write

concurrency:
  group: study-hub
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Generate course content (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/generate.py
      - name: Build the site
        run: python src/build_site.py
      - name: Commit
        run: |
          git config user.name  "study-hub-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Rebuild course $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "retry $i"; sleep 5
          done
          exit 1
