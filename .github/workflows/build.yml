name: Build Study Hub

on:
  workflow_dispatch: {}
  schedule:
    # 03:00 UTC = 12:00 KST. Incrementally fills any missing chapters daily
    # until the course is complete, then it's a no-op (no API calls, no commit).
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: study-hub
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Generate course content (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MIN_INTERVAL: "6"   # ~10 calls/min, stays under the free per-minute cap
        run: python src/generate.py
      - name: Build the site
        run: python src/build_site.py
      - name: Commit
        run: |
          git config user.name  "study-hub-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes (course already complete)."
            exit 0
          fi
          git commit -m "Course update $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "retry $i"; sleep 5
          done
          exit 1
